services:
  openchamber:
    image: ghcr.io/sbonnick/openchamber-docker:latest
    container_name: openchamber
    restart: unless-stopped
    ports:
      - "${OPENCHAMBER_PORT:-3000}:3000"
    environment:
      OPENCHAMBER_UI_PASSWORD: "${OPENCHAMBER_UI_PASSWORD:-}"
      OPENCODE_CONFIG_DIR: "/home/openchamber/.config/opencode"
      # Pass provider credentials through your shell or .env file as needed.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    volumes:
      - ./data/openchamber:/home/openchamber/.config/openchamber
      - ./data/opencode/config:/home/openchamber/.config/opencode
      - ./data/opencode/share:/home/openchamber/.local/share/opencode
      - ./data/opencode/state:/home/openchamber/.local/state
      # Optional: persist a generated SSH key for private Git repos over SSH.
      - ./data/ssh:/home/openchamber/.ssh
      - ./data/workspace:/home/openchamber/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
